<svg width="40" height="60" xmlns="http://www.w3.org/2000/svg">
  <!-- Head -->
  <circle cx="20" cy="8" r="8" fill="#c8a068" stroke="#8a6040" stroke-width="1.5"/>
  <!-- Neck -->
  <rect x="17" y="15" width="6" height="5" fill="#c8a068"/>
  <!-- Body -->
  <rect x="8" y="20" width="24" height="28" rx="3" ry="3" fill="#c8a068" stroke="#8a6040" stroke-width="1.5"/>
  <!-- Left arm -->
  <rect x="0" y="20" width="7" height="20" rx="3" ry="3" fill="#c8a068" stroke="#8a6040" stroke-width="1.5"/>
  <!-- Right arm -->
  <rect x="33" y="20" width="7" height="20" rx="3" ry="3" fill="#c8a068" stroke="#8a6040" stroke-width="1.5"/>
  <!-- Left leg -->
  <rect x="9" y="48" width="8" height="12" rx="3" ry="3" fill="#c8a068" stroke="#8a6040" stroke-width="1.5"/>
  <!-- Right leg -->
  <rect x="23" y="48" width="8" height="12" rx="3" ry="3" fill="#c8a068" stroke="#8a6040" stroke-width="1.5"/>
  <!-- Target cross on body -->
  <line x1="20" y1="22" x2="20" y2="46" stroke="#e03030" stroke-width="1.5"/>
  <line x1="10" y1="34" x2="30" y2="34" stroke="#e03030" stroke-width="1.5"/>
  <!-- Cross circle -->
  <circle cx="20" cy="34" r="5" fill="none" stroke="#e03030" stroke-width="1.5"/>
</svg>