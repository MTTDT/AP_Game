<svg width="18" height="86" xmlns="http://www.w3.org/2000/svg">
  <!-- Wide receiver body -->
  <rect x="0" y="0" width="18" height="18" rx="3" ry="3" fill="white" opacity="0.9"/>
  <!-- Side vents left -->
  <rect x="0" y="4"  width="3" height="2" rx="0.5" ry="0.5" fill="white" opacity="0.45"/>
  <rect x="0" y="9"  width="3" height="2" rx="0.5" ry="0.5" fill="white" opacity="0.45"/>
  <rect x="0" y="14" width="3" height="2" rx="0.5" ry="0.5" fill="white" opacity="0.45"/>
  <!-- Side vents right -->
  <rect x="15" y="4"  width="3" height="2" rx="0.5" ry="0.5" fill="white" opacity="0.45"/>
  <rect x="15" y="9"  width="3" height="2" rx="0.5" ry="0.5" fill="white" opacity="0.45"/>
  <rect x="15" y="14" width="3" height="2" rx="0.5" ry="0.5" fill="white" opacity="0.45"/>
  <!-- Wide barrel -->
  <rect x="4" y="16" width="10" height="66" rx="2" ry="2" fill="white" opacity="1.0"/>
  <!-- Barrel highlight -->
  <rect x="4" y="16" width="3.5" height="66" rx="2" ry="2" fill="white" opacity="0.35"/>
  <!-- Cooling rings -->
  <rect x="3" y="30" width="12" height="3" rx="1" ry="1" fill="white" opacity="0.5"/>
  <rect x="3" y="48" width="12" height="3" rx="1" ry="1" fill="white" opacity="0.5"/>
  <rect x="3" y="66" width="12" height="3" rx="1" ry="1" fill="white" opacity="0.5"/>
  <!-- Muzzle -->
  <rect x="3" y="79" width="12" height="3" rx="1" ry="1" fill="white" opacity="0.85"/>
  <!-- Base shadow underline -->
  <rect x="0" y="16" width="18" height="3" rx="1" ry="1" fill="white" opacity="0.3"/>
</svg>