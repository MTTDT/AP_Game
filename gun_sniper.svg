  <!-- Scope body -->
  <rect x="0" y="1" width="5" height="18" rx="1.5" ry="1.5" fill="white" opacity="0.6"/>
  <!-- Scope front cap -->
  <rect x="0" y="17" width="5" height="3" rx="1" ry="1" fill="white" opacity="0.9"/>
  <!-- Scope rear cap -->
  <rect x="0" y="0" width="5" height="3" rx="1" ry="1" fill="white" opacity="0.9"/>
  <!-- Long thin barrel -->
  <rect x="4.5" y="8" width="4" height="108" rx="1.5" ry="1.5" fill="white" opacity="1.0"/>
  <!-- Barrel highlight -->
  <rect x="4.5" y="8" width="1.5" height="108" rx="1" ry="1" fill="white" opacity="0.35"/>
  <!-- Muzzle brake -->
  <rect x="3" y="112" width="7" height="4" rx="1" ry="1" fill="white" opacity="0.8"/>
